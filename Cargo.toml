[workspace]
resolver = "2"
members = [
  ".",
  "crates/*",
]

[workspace.package]
version = "0.0.0"
edition = "2021"

[workspace.dependencies]
lunest_macros = { path = "crates/macros" }
lunest_shared = { path = "crates/shared" }
mlua = "0.9.5"
anyhow = "1.0.79"
clap = { version = "4.4.18", features = ["derive"] }
project-root = "0.2.2"
zip = "0.6.6"

[profile.release]
opt-level = "z"
codegen-units = 1

[package]
name = "lunest"
version.workspace = true
edition.workspace = true

[dependencies]
lunest_shared.workspace = true
anyhow.workspace = true
clap.workspace = true
zip.workspace = true
dirs = "5.0.1"

[build-dependencies]
anyhow.workspace = true
project-root.workspace = true
zip.workspace = true
