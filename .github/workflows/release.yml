name: Release

on:
  push:
    tags:
      - 'v*'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            rustflags: -C target-feature=+crt-static
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            rustflags: -C target-feature=+crt-static
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            build-target: x86_64-unknown-linux-gnu.2.17
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            build-target: aarch64-unknown-linux-gnu.2.17

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cache for Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        if: runner.os == 'Linux'
        uses: actions/setup-python@v5
        with:
          cache: pip

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        run: |
          pip install cargo-zigbuild
          echo "CARGO=$(which cargo-zigbuild)" >> $GITHUB_ENV

      - name: Compile
        run: cargo xtask build --release --target ${{ matrix.build-target || matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Upload an artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/lunest${{ runner.os == 'Windows' && '.exe' || '' }}

  publish:
    needs: [build]

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - run: find

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifact-*/*
          name: ${{ env.TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
