[workspace]
resolver = "2"
members = [
  ".",
  "crates/*",
]

[workspace.package]
version = "0.0.0"
edition = "2021"

[workspace.dependencies]
lunest_macros = { path = "crates/macros" }
lunest_shared = { path = "crates/shared" }
mlua = "0.9.5"
anyhow = "1.0.79"
clap = { version = "4.5.1", features = ["derive"] }
project-root = "0.2.2"
zip = { version = "0.6.6", default-features = false, features = ["zstd"] }

[profile.release]
lto = true
strip = true
opt-level = "z"
codegen-units = 1

[profile.release.package.lunest_lib]
strip = false

[package]
name = "lunest"
version.workspace = true
edition.workspace = true

[dependencies]
lunest_shared = { workspace = true, features = ["cli", "config"] }
anyhow.workspace = true
zip.workspace = true
dirs = "5.0.1"

[build-dependencies]
anyhow.workspace = true
project-root.workspace = true
zip.workspace = true
