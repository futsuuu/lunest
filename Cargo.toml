[package]
name = "lunest"
version = "0.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0.79"
mlua = { version = "0.9.4", features = ["module"] }
clap = { version = "4.4.18", features = ["derive"] }
globwalk = "0.9.1"

[features]
default = ["luajit"]
lua51 = ["mlua/lua51"]
lua52 = ["mlua/lua52"]
lua53 = ["mlua/lua53"]
lua54 = ["mlua/lua54"]
luajit = ["mlua/luajit"]
luajit52 = ["mlua/luajit52"]
luau = ["mlua/luau"]
luau-jit = ["mlua/luau-jit"]
